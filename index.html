<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Dragos Files</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  background: #f5f5f5;
}

.sidebar {
  width: 220px;
  padding: 20px;
}

.sidebar h2 {
  font-size: 28px;
}

.folder {
  margin: 8px 0;
}

.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

h1 {
  font-size: 50px;
  text-align: center;
}

#timer {
  font-size: 30px;
  margin-top: 20px;
}

button {
  display: none;
  margin-top: 20px;
  padding: 15px 40px;
  font-size: 18px;
  background: red;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: darkred;
}

#secretImage {
  display: none;
  margin-top: 20px;
  max-width: 400px;
}

.footer {
  position: absolute;
  bottom: 10px;
  right: 20px;
}
</style>

</head>
<body>

<div class="sidebar">
  <h2>Cuprins</h2>
  <div class="folder">📁 Matei Bolog</div>
  <div class="folder">📁 Olariu Stefan</div>
  <div class="folder">📁 Daniel</div>
  <div class="folder">📁 Alin</div>
  <div class="folder">📁 Cozma Stefan</div>
  <div class="folder">📁 Raluca</div>
  <div class="folder">📁 Dragos</div>
</div>

<div class="main">
  <h1>Afla adevarul despre Fisierele Dragos</h1>

  <div id="timer"></div>

  <button id="revealBtn" onclick="reveal()">REVEAL</button>

  <img id="secretImage" src="imaginea-ta.jpg">

  <audio id="audio" src="melodie.mp3"></audio>
</div>

<div class="footer">
  Copyright © Dragos Files 2025-2026
</div>

<script>
// DATA EXACTĂ (România = UTC+2 / +3 cu DST)
const targetDate = new Date("2026-03-29T15:00:00+02:00");

const timerEl = document.getElementById("timer");
const button = document.getElementById("revealBtn");

function updateTimer() {
  const now = new Date();
  const diff = targetDate - now;

  if (diff <= 0) {
    timerEl.style.display = "none";
    button.style.display = "block";
    clearInterval(interval);
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  timerEl.innerHTML =
    days + "z " + hours + "h " + minutes + "m " + seconds + "s";
}

const interval = setInterval(updateTimer, 1000);
updateTimer();

function reveal() {
  document.getElementById("secretImage").style.display = "block";
  document.getElementById("audio").play();
}
</script>

</body>
</html>
